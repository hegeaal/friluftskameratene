name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Append test details to job summary
        if: always() && hashFiles('apps/test-results.json') != ''
        run: |
          jq -r '
            "### Tester som kjørte",
            "",
            (.testResults[] |
              "#### `" + (.name | sub(".*/apps/"; "")) + "`",
              "",
              (.assertionResults[] |
                "- " +
                (if .status == "passed" then "✅" else "❌" end) +
                " **" + (.ancestorTitles | join(" › ")) + "** — " +
                .title +
                " _(" + ((.duration * 100 | round) / 100 | tostring) + "ms)_"
              ),
              ""
            )
          ' test-results.json >> "$GITHUB_STEP_SUMMARY"
