name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt

      - name: Append test details to job summary
        if: always()
        run: |
          {
            echo ""
            echo "### Tester som kjørte"
            echo ""
            echo '```'
            cat test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
